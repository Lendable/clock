name: "Sloth"

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  checks: read

jobs:
  sloth:
    name: "Sloth"
    runs-on: ubuntu-24.04
    steps:
      - name: Sloth
        uses: lendable/sloth@dbff4bbe34557fd3bd3865387f900d92034b9259 # v1.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          case-sensitive: false
